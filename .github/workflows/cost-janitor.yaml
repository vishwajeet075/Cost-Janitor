name: Cost Janitor

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments

jobs:
  # ── Job 1: Terraform lint (no cloud needed) ──────────────────────────────────
  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (local backend, no cloud)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  # ── Job 2: Unit tests (pure Moto, no Docker) ─────────────────────────────────
  unit-tests:
    name: Janitor unit tests (Moto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: janitor/requirements.txt

      - name: Install dependencies
        run: pip install -r janitor/requirements.txt

      - name: Run unit tests
        working-directory: janitor
        run: pytest tests/ -v --tb=short

  # ── Job 3: Cost Janitor dry-run scan (Moto-seeded environment) ───────────────
  cost-janitor:
    name: Cost Janitor dry-run scan
    runs-on: ubuntu-latest
    needs: [unit-tests]   # only scan if tests pass

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: janitor/requirements.txt

      - name: Install dependencies
        run: pip install -r janitor/requirements.txt

      # ── Seed fake AWS resources via Moto ─────────────────────────────────────
      # This script starts a moto_server process (HTTP mode) so that janitor.py
      # can talk to it exactly like it would talk to LocalStack, via --endpoint-url.
      - name: Seed orphan resources (Moto server)
        run: |
          pip install moto[server] --quiet

          # Start moto in server mode on port 5000 in the background
          python -m moto.server -p 5000 &
          MOTO_PID=$!
          echo "MOTO_PID=$MOTO_PID" >> $GITHUB_ENV

          # Wait for it to be ready
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "✅ Moto server is ready"
              break
            fi
            echo "  attempt $i/20 — waiting..."
            sleep 2
          done

          # Seed resources: unattached EBS, idle EIP, stopped EC2, untagged instance
          python - <<'EOF'
          import boto3

          ec2 = boto3.client(
              "ec2",
              region_name="us-east-1",
              endpoint_url="http://localhost:5000",
              aws_access_key_id="test",
              aws_secret_access_key="test",
          )

          FULL_TAGS = [
              {"Key": "Project",     "Value": "nimbuskart"},
              {"Key": "Environment", "Value": "staging"},
              {"Key": "Owner",       "Value": "platform-team"},
              {"Key": "ManagedBy",   "Value": "terraform"},
          ]

          # 1. Unattached EBS volume — the intentional orphan from Part A
          ec2.create_volume(
              AvailabilityZone="us-east-1a",
              Size=20,
              VolumeType="gp3",
              TagSpecifications=[{"ResourceType": "volume", "Tags": FULL_TAGS}],
          )
          print("Seeded: unattached EBS volume (20 GB gp3)")

          # 2. Idle Elastic IP (no instance associated)
          ec2.allocate_address(Domain="vpc")
          print("Seeded: idle Elastic IP")

          # 3. EC2 instance with no tags (triggers missing-tags scanner)
          ec2.run_instances(
              ImageId="ami-00000000",   # Moto accepts any string
              MinCount=1,
              MaxCount=1,
              # Intentionally no tags — should be flagged
          )
          print("Seeded: untagged running EC2 instance")

          print("✅ All seed resources created")
          EOF

      # ── Run the janitor against the Moto server ───────────────────────────────
      - name: Run Cost Janitor (dry-run)
        id: janitor
        working-directory: janitor
        run: |
          python janitor.py \
            --dry-run \
            --region us-east-1 \
            --endpoint-url http://localhost:5000 \
            --stopped-days 14 \
            --output-dir ../reports
        # exit 1 = orphans found; we still want artifacts + PR comment before failing
        continue-on-error: true

      - name: Capture janitor result
        id: result
        run: |
          if [ "${{ steps.janitor.outcome }}" = "failure" ]; then
            echo "orphans_found=true" >> $GITHUB_OUTPUT
          else
            echo "orphans_found=false" >> $GITHUB_OUTPUT
          fi

      # ── Upload reports ────────────────────────────────────────────────────────
      - name: Upload cost janitor reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-reports
          path: |
            reports/report.json
            reports/report.md
          retention-days: 30
          if-no-files-found: warn

      # ── PR comment: orphans found ─────────────────────────────────────────────
      - name: Read Markdown report
        id: read_report
        if: github.event_name == 'pull_request' && steps.result.outputs.orphans_found == 'true'
        run: |
          if [ -f reports/report.md ]; then
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> $GITHUB_OUTPUT
            head -c 60000 reports/report.md >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          else
            echo "body=⚠️ Cost Janitor found orphans but report.md is missing." >> $GITHUB_OUTPUT
          fi

      - name: Post orphans PR comment
        if: github.event_name == 'pull_request' && steps.result.outputs.orphans_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ⚠️ Cost Janitor — Orphaned Resources Detected\n\n` +
                         `${{ steps.read_report.outputs.body }}\n\n` +
                         `---\n` +
                         `_Run by [workflow #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cost Janitor')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── PR comment: all clean ─────────────────────────────────────────────────
      - name: Post clean PR comment
        if: github.event_name == 'pull_request' && steps.result.outputs.orphans_found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ✅ Cost Janitor — No Orphaned Resources Found\n\n` +
                         `Scan completed cleanly. No orphaned EBS volumes, stopped EC2 instances, ` +
                         `idle Elastic IPs, or untagged resources were detected.\n\n` +
                         `---\n` +
                         `_Run by [workflow #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cost Janitor')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Fail AFTER artifacts and comments are done ────────────────────────────
      - name: Fail if orphans found
        if: steps.result.outputs.orphans_found == 'true'
        run: |
          echo "❌ Orphaned resources detected. See report artifact for details."
          echo "   Tag resources correctly or add Protected=true to suppress."
          exit 1
name: Cost Janitor

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   

jobs:

  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  unit-tests:
    name: Janitor unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: janitor/requirements.txt

      - name: Install dependencies
        run: pip install -r janitor/requirements.txt

      - name: Run unit tests
        working-directory: janitor
        run: pytest tests/ -v --tb=short


  cost-janitor:
    name: Cost Janitor dry-run scan
    runs-on: ubuntu-latest
    needs: [unit-tests]  

    services:
      localstack:
        image: localstack/localstack:3.8.1
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,sts
          DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          DEBUG: "0"
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | grep -q '\"ec2\": \"available\"'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 30s

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: janitor/requirements.txt

      - name: Install Python dependencies
        run: pip install -r janitor/requirements.txt

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Install terraform-local (tflocal)
        run: pip install terraform-local

      - name: Wait for LocalStack to accept connections
        run: |
          echo "Waiting for LocalStack on localhost:4566..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health | grep -q '"ec2": "available"'; then
              echo "LocalStack is ready (attempt $i)"
              break
            fi
            echo "  attempt $i/30 — not ready yet, sleeping 5s..."
            sleep 5
          done
          # Hard fail if still not up after 150s
          curl -sf http://localhost:4566/_localstack/health | grep -q '"ec2": "available"'
          echo "LocalStack health confirmed."

      - name: Terraform init
        working-directory: terraform
        run: tflocal init -input=false

      - name: Terraform validate
        working-directory: terraform
        run: tflocal validate

      - name: Terraform apply
        working-directory: terraform
        run: tflocal apply -auto-approve -input=false

      - name: Run Cost Janitor (dry-run)
        id: janitor
        working-directory: janitor
        run: |
          python janitor.py \
            --dry-run \
            --region us-east-1 \
            --endpoint-url http://localhost:4566 \
            --stopped-days 14 \
            --output-dir ../reports
        continue-on-error: true

      - name: Capture janitor result
        id: result
        run: |
          if [ "${{ steps.janitor.outcome }}" = "failure" ]; then
            echo "orphans_found=true" >> $GITHUB_OUTPUT
          else
            echo "orphans_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload cost janitor reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-reports
          path: |
            reports/report.json
            reports/report.md
          retention-days: 30
          if-no-files-found: warn

      - name: Read Markdown report
        id: read_report
        if: github.event_name == 'pull_request' && steps.result.outputs.orphans_found == 'true'
        run: |
          if [ -f reports/report.md ]; then
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> $GITHUB_OUTPUT
            head -c 60000 reports/report.md >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Cost Janitor found orphans but report.md is missing." >> $GITHUB_OUTPUT
          fi

      - name: Post orphans PR comment
        if: github.event_name == 'pull_request' && steps.result.outputs.orphans_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Cost Janitor — Orphaned Resources Detected\n\n` +
                         `${{ steps.read_report.outputs.body }}\n\n` +
                         `---\n` +
                         `_Run by [workflow #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cost Janitor')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }


      - name: Post clean PR comment
        if: github.event_name == 'pull_request' && steps.result.outputs.orphans_found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `##Cost Janitor — No Orphaned Resources Found\n\n` +
                         `Scan completed cleanly. No orphaned EBS volumes, stopped EC2 instances, ` +
                         `idle Elastic IPs, or untagged resources were detected.\n\n` +
                         `---\n` +
                         `_Run by [workflow #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Cost Janitor')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if orphans found
        if: steps.result.outputs.orphans_found == 'true'
        run: |
          echo "Orphaned resources detected. See report artifact for details."
          echo "   Tag resources correctly or add Protected=true to suppress."
          exit 1